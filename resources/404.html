<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>MiniHTTPServer | Error 404</title>

    <style>

        body {

            font-family: Arial, sans-serif;
            background: #f5f7fb;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;

        }

        .card {

            background: white;
            width: 600px;

            padding: 50px;

            border-radius: 18px;

            box-shadow: 0 8px 20px rgba(0,0,0,.12);

            text-align: center;

        }

        h1 {

            font-size: 72px;
            color: #dc3545;
            margin: 0;

        }

        h2 {

            color: #444;

        }

        p {

            color: #666;
            margin-top: 20px;

        }

        a {

            display: inline-block;

            margin-top: 30px;

            padding: 12px 24px;

            text-decoration: none;

            background: #0d6efd;

            color: white;

            border-radius: 8px;

        }

        a:hover {

            background: #0b5ed7;

        }

    </style>

</head>

<body>

<div class="card">

    <h1>404</h1>

    <h2>Página no encontrada</h2>

    <p>

        La página solicitada no existe en este servidor.

    </p>

    <a href="/">

        Volver al inicio

    </a>

</div>

</body>

</html>
